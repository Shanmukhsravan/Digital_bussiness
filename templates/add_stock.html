{% extends "base.html" %}
{% block content %}

<div class="animate-fade" style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem;"><i class="fas fa-plus-circle"></i> Update Stock Inventory</h2>
        
        <form method="post">
            <div class="form-group">
                <label>Brand Name</label>
                <input name="brand" class="form-control" required placeholder="e.g. UltraTech">
            </div>

            <div class="form-group">
                <label>Arrival Date</label>
                <input name="date" type="date" class="form-control" required value="{{ today_date }}">
            </div>

            <div class="form-group">
                <label>Quantity to Add (Bags)</label>
                <input name="quantity" type="number" class="form-control" required placeholder="e.g. 500">
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Purchase Price / Bag (₹)</label>
                    <input name="purchase_price" type="number" step="0.01" class="form-control" required placeholder="e.g. 380">
                </div>
                <div class="form-group">
                    <label>Amount Settled?</label>
                    <select name="settled" class="form-control">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Description / Vendor Name</label>
                <input name="description" class="form-control" placeholder="e.g. Loaded from [Vendor Name] - [Truck Number]">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Update Stock</button>
                <a href="/" class="btn" style="flex: 1; background: rgba(0,0,0,0.05); justify-content: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
