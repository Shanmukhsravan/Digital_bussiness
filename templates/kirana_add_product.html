{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card animate__animated animate__zoomIn">
            <h4 class="text-center mb-4">Add New Product</h4>
            
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Rin Soap, Milk Packet" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Variant / Size</label>
                    <input type="text" name="variant" class="form-control" placeholder="e.g. 250g, 1 Liter" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Cost Price (₹)</label>
                        <input type="number" step="0.01" name="cost_price" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Selling Price (₹)</label>
                        <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Opening Stock Quantity</label>
                    <input type="number" name="stock" class="form-control" placeholder="0" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 mb-3">
                    <i class="fas fa-plus-circle me-2"></i> Add/Update Product
                </button>
                
                <a href="{{ url_for('kirana_dashboard') }}" class="btn btn-outline-secondary w-100">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
