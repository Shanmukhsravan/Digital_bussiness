{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card animate__animated animate__zoomIn">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Record Sale</h4>
                <div class="d-flex gap-2">
                    <a href="{{ url_for('kirana_update_stock') }}" class="btn btn-sm btn-outline-warning">Update Stock</a>
                    <a href="{{ url_for('kirana_palm_update') }}" class="btn btn-sm btn-outline-dark">Palm Wine</a>
                </div>
            </div>
            
            <form method="post">
                <div class="mb-4">
                    <label class="form-label">Select Product</label>
                    <select name="product_id" class="form-select form-select-lg" required>
                        <option value="" disabled selected>Choose a product...</option>
                        {% for product in products %}
                        <option value="{{ product[0] }}">
                            {{ product[1] }} ({{ product[2] }}) - ₹{{ "{:,.2f}".format(product[3]) }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Quantity Sold</label>
                    <input type="number" name="quantity" class="form-control form-control-lg text-center" placeholder="1" required min="1">
                </div>
                
                <button type="submit" class="btn btn-success w-100 btn-lg mb-3">
                    <i class="fas fa-check-circle me-2"></i> Save Sale
                </button>
            </form>
            
            <a href="{{ url_for('kirana_dashboard') }}" class="btn btn-link w-100 text-muted text-decoration-none">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
