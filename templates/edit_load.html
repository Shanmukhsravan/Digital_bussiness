{% extends "base.html" %}
{% block content %}

<div class="animate-fade" style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 2rem;"><i class="fas fa-truck-moving"></i> Edit Load History</h2>
        
        <form method="post">
            <div class="form-group">
                <label>Brand Name</label>
                <select name="brand" class="form-control" required>
                    {% for b in brands %}
                    <option value="{{ b }}" {% if b == load[1] %}selected{% endif %}>{{ b }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Load Name / Number</label>
                <input name="load_name" class="form-control" value="{{ load[4] }}" required>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Quantity (Bags)</label>
                    <input name="quantity" type="number" class="form-control" value="{{ load[2] }}" required>
                </div>
                <div class="form-group">
                    <label>Arrival Date</label>
                    <input name="date" type="date" class="form-control" value="{{ load[3] }}" required>
                </div>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Purchase Price (per bag)</label>
                    <input name="purchase_price" type="number" step="0.01" class="form-control" value="{{ load[5] }}" required>
                </div>
                <div class="form-group">
                    <label>Settled?</label>
                    <select name="settled" class="form-control">
                        <option value="No" {% if load[6] == 'No' %}selected{% endif %}>No</option>
                        <option value="Yes" {% if load[6] == 'Yes' %}selected{% endif %}>Yes</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Description / Notes</label>
                <textarea name="description" class="form-control" rows="3">{{ load[7] }}</textarea>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2; justify-content: center;">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="/" class="btn btn-secondary" style="flex: 1; justify-content: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
