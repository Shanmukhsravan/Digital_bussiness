{% extends "base.html" %}
{% block content %}

<div class="animate-fade" style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 2rem;"><i class="fas fa-trash-can"></i> Edit Waste Record</h2>
        
        <form method="post">
            <div class="form-group">
                <label>Brand Name</label>
                <select name="brand" class="form-control" required>
                    {% for b in brands %}
                    <option value="{{ b }}" {% if b == waste[1] %}selected{% endif %}>{{ b }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Quantity Wasted (Bags)</label>
                <input name="quantity" type="number" class="form-control" value="{{ waste[2] }}" required>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input name="date" type="date" class="form-control" value="{{ waste[3] }}" required>
            </div>

            <div class="form-group">
                <label>Reason for Waste</label>
                <input name="reason" class="form-control" value="{{ waste[4] }}" placeholder="e.g. Broken bags during unloading">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2; border-color: var(--danger); background: var(--danger); justify-content: center;">
                    <i class="fas fa-save"></i> Update Waste record
                </button>
                <a href="/" class="btn btn-secondary" style="flex: 1; justify-content: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
