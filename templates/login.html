{% extends "base.html" %}

{% block content %}
<div class="login-page-wrapper">
    <!-- Animated Background Elements -->
    <div class="mesh-gradient"></div>
    <div class="bokeh bokeh-1"></div>
    <div class="bokeh bokeh-2"></div>
    <div class="bokeh bokeh-3"></div>

    <div class="login-card-ultimate">
        <div class="login-brand-section">
            <div class="premium-logo">
                <i class="fas fa-shopping-basket"></i>
            </div>
            <h1 class="brand-name">Build<span>Basket</span></h1>
            <p class="brand-tagline">Precision Commerce Management</p>
        </div>

        <form method="post" class="ultimate-form">
            <div class="form-field">
                <div class="input-icon"><i class="fas fa-user-circle"></i></div>
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
                <div class="field-focus-line"></div>
            </div>
            
            <div class="form-field">
                <div class="input-icon"><i class="fas fa-shield-halved"></i></div>
                <input type="password" name="password" placeholder="Password" required>
                <div class="field-focus-line"></div>
            </div>

            <div class="form-extras">
                <label class="custom-checkbox">
                    <input type="checkbox" name="remember">
                    <span class="checkmark"></span>
                    <span class="label-text">Stay Signed In</span>
                </label>
                <a href="#" class="forgot-link">Help?</a>
            </div>

            <button type="submit" class="submit-btn-glow">
                <span>Access Dashboard</span>
                <div class="btn-shimmer"></div>
            </button>
        </form>

        <div class="ultimate-footer">
            <p>Smart Kirana & Construction Unified v3.0</p>
            <div class="footer-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>
</div>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* Reset Container for Login Only */
.container { 
    max-width: 100% !important; 
    padding: 0 !important; 
    margin: 0 !important;
}

.login-page-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #020617;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    z-index: 9999; /* Over everything including navbar since it's login */
}

/* Mesh Gradient Background */
.mesh-gradient {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 30%, #1e40af 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #6366f1 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, #f59e0b 0%, transparent 40%),
                radial-gradient(circle at 10% 90%, #7c3aed 0%, transparent 50%);
    filter: blur(80px);
    opacity: 0.25;
    animation: rotateMesh 30s linear infinite;
}

@keyframes rotateMesh {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.bokeh {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.15;
    z-index: 1;
}
.bokeh-1 { width: 300px; height: 300px; background: #1e40af; top: -50px; left: -50px; animation: float 15s ease-in-out infinite; }
.bokeh-2 { width: 400px; height: 400px; background: #f59e0b; bottom: -100px; right: -50px; animation: float 20s ease-in-out infinite reverse; }
.bokeh-3 { width: 250px; height: 250px; background: #7c3aed; top: 40%; left: 60%; animation: float 18s ease-in-out infinite; }

@keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(40px, 40px); }
}

/* The Card */
.login-card-ultimate {
    position: relative;
    width: 440px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-radius: 40px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 4rem 3.5rem;
    box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
    z-index: 10;
    text-align: center;
    transform: translateY(20px);
    opacity: 0;
    animation: cardAppear 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes cardAppear {
    to { transform: translateY(0); opacity: 1; }
}

.premium-logo {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #1e40af, #6366f1);
    color: white;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    margin: 0 auto 1.5rem;
    box-shadow: 0 20px 40px rgba(30, 64, 175, 0.4);
    position: relative;
}

.premium-logo::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 26px;
    background: linear-gradient(135deg, rgba(255,255,255,0.4), transparent);
    z-index: -1;
}

.brand-name {
    color: #f8fafc;
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    margin-bottom: 0.5rem;
}

.brand-name span { color: #f59e0b; }

.brand-tagline {
    color: #94a3b8;
    font-size: 0.85rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 3rem;
}

/* Form Styling */
.form-field {
    position: relative;
    margin-bottom: 1.5rem;
    text-align: left;
}

.input-icon {
    position: absolute;
    left: 1.25rem;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
    font-size: 1.2rem;
    transition: 0.3s;
}

.form-field input {
    width: 100%;
    padding: 1.1rem 1.25rem 1.1rem 3.5rem;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    color: white;
    font-size: 1rem;
    outline: none;
    transition: 0.3s;
}

.form-field input:focus {
    background: rgba(255, 255, 255, 0.07);
    border-color: #3b82f6;
}

.form-field input:focus ~ .input-icon {
    color: #3b82f6;
}

.field-focus-line {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #3b82f6, transparent);
    transition: 0.4s;
    transform: translateX(-50%);
}

.form-field input:focus ~ .field-focus-line {
    width: 60%;
}

.form-extras {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 1.5rem 0 2.5rem;
}

.custom-checkbox {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    color: #94a3b8;
    font-size: 0.9rem;
}

.custom-checkbox input { display: none; }

.checkmark {
    width: 20px;
    height: 20px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    position: relative;
    transition: 0.3s;
}

.custom-checkbox input:checked ~ .checkmark {
    background: #3b82f6;
    border-color: #3b82f6;
}

.custom-checkbox input:checked ~ .checkmark::after {
    content: '\f00c';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    color: white;
    font-size: 0.7rem;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.forgot-link {
    color: #3b82f6;
    font-size: 0.9rem;
    text-decoration: none;
}

.submit-btn-glow {
    width: 100%;
    padding: 1.25rem;
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    border: none;
    border-radius: 18px;
    color: white;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: 0.4s;
    box-shadow: 0 15px 30px rgba(30, 64, 175, 0.3);
}

.submit-btn-glow:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 40px rgba(30, 64, 175, 0.4);
}

.btn-shimmer {
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-20deg);
    transition: 0.5s;
}

.submit-btn-glow:hover .btn-shimmer {
    left: 150%;
}

.ultimate-footer {
    margin-top: 4rem;
    color: #64748b;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
}

.footer-dots {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1rem;
}

.footer-dots span {
    width: 4px;
    height: 4px;
    background: #334155;
    border-radius: 50%;
}

/* Mobile Fixes */
@media (max-width: 480px) {
    .login-card-ultimate {
        width: 100%;
        height: 100%;
        border-radius: 0;
        padding: 6rem 2rem;
    }
}
</style>
{% endblock %}
