{% extends "base.html" %}
{% block content %}

<div class="animate-fade" style="max-width: 400px; margin: 4rem auto;">
    <div class="card" style="text-align: center;">
        <div class="nav-brand" style="justify-content: center; margin-bottom: 2rem;">
            <i class="fas fa-briefcase"></i>
            <span>Digital_Business</span>
        </div>
        
        <form method="post">
            <div class="form-group" style="text-align: left;">
                <label>Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 1rem; top: 1rem; opacity: 0.5;"></i>
                    <input name="username" class="form-control" required style="padding-left: 2.5rem;" placeholder="Enter username">
                </div>
            </div>

            <div class="form-group" style="text-align: left;">
                <label>Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 1rem; opacity: 0.5;"></i>
                    <input name="password" type="password" class="form-control" required style="padding-left: 2.5rem;" placeholder="Enter password">
                </div>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; margin-top: 1rem;">
                <input type="checkbox" name="remember" id="remember" style="width: 18px; height: 18px; cursor: pointer;">
                <label for="remember" style="margin: 0; cursor: pointer; font-size: 0.9rem; opacity: 0.8;">Remember me for 7 days</label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1.5rem; padding: 1rem;">
                Sign In
            </button>
        </form>
        <div style="margin-top: 1.5rem; opacity: 0.6; font-size: 0.8rem;">
            powered by Bajjangi
        </div>
    </div>
</div>

{% endblock %}
